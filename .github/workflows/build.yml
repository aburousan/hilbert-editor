name: Release desktop bundles

# Builds, signs, and publishes a cross-platform release with the auto-updater
# artifacts + latest.json, so installed apps can update themselves.
#
# Tauri compiles native code against each OS's system webview (WebKitGTK on
# Linux, WebView2 on Windows, WKWebView on macOS), so — unlike Electron — it
# cannot cross-compile; each target builds on its own runner.
#
# Manual trigger. It creates a DRAFT release: every platform job uploads its
# bundles and merges its signature into a single latest.json on that draft.
# Publish the draft afterwards (and mark it Latest) so the updater endpoint
# — github…/releases/latest/download/latest.json — resolves to it.

on:
  workflow_dispatch:

permissions:
  contents: write        # tauri-action needs this to create the release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04        # Linux: AppImage + .deb
            args: ""
            rust_target: ""
          - os: macos-14            # macOS Apple Silicon: .app + .dmg
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          - os: macos-13            # macOS Intel: .app + .dmg
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
          - os: windows-latest      # Windows x64: .msi + .exe (NSIS)
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The built UI (resources/dist) is committed in this repo — no frontend
      # build step needed here. To refresh it, rebuild the sibling project and
      # re-copy dist (see README).

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Pinned to a commit SHA (not the mutable @v0 tag) so a compromise of the
      # action's tag can't run with the signing key. SHA is action-v1.0.0.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the auto-updater artifacts. Repo secret = the full contents of
          # ~/Desktop/hilbert-updater-private.key. The key's password is empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: .
          args: ${{ matrix.args }}
          tagName: tauri-v__VERSION__
          releaseName: "Hilbert (Tauri) v__VERSION__"
          releaseBody: "Fixes the a4/us-letter page size in the preview and improves the bidirectional source/PDF link."
          releaseDraft: true
          prerelease: false
