name: Build desktop bundles

# Tauri compiles native code against each OS's system webview (WebKitGTK on
# Linux, WebView2 on Windows, WKWebView on macOS), so — unlike Electron — it
# cannot cross-compile. Each target is built on its own runner.
#
# Triggers use the `tauri-v*` tag prefix (NOT the Electron `v*` tags) so the two
# release lines never collide: Electron keeps `v0.1.x`, Tauri uses `tauri-v0.1.x`.
on:
  workflow_dispatch:        # build on demand from the Actions tab
  push:
    tags: ["tauri-v*"]      # release build (creates a draft release)

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04        # Linux: AppImage + .deb + .rpm
            args: ""
          - os: windows-latest      # Windows: NSIS .exe + .msi
            args: ""
          - os: macos-14            # macOS Apple Silicon: .app + .dmg
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The built UI (resources/dist) is committed in this repo — no frontend
      # build step needed here. To refresh it, rebuild the sibling project and
      # re-copy dist (see README).

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-14' && 'aarch64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # On a `tauri-v*` tag: create/attach to a separate, clearly-named GitHub
      # Release (draft, so you publish it deliberately) — kept distinct from the
      # Electron releases. On a branch push: tagName is empty, so it only builds
      # and the artifacts are grabbed by upload-artifact below.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "Typst Editor (Tauri) v__VERSION__"
          releaseBody: "Tauri desktop build. Native installers per platform, attached below."
          releaseDraft: true
          prerelease: false

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.dmg
